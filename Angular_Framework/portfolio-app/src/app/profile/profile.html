<div class="page-container">
  <div class="header">
    <button class="menu-btn" (click)="sidebarService.open()">☰</button>
    <h2>Profile</h2>
  </div>

  <div class="profile-content">
    <div class="avatar-container">
      <div class="avatar"></div>
    </div>
    
    <div class="profile-info">
      <h1>John Doe</h1>
      <p class="role">UI/UX Designer</p>
    </div>
    
    <div class="stats-container">
      <div class="stat-item">
        <h3>5978</h3>
        <p>Followers</p>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <h3>75</h3>
        <p>Following</p>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <h3>983</h3>
        <p>Likes</p>
      </div>
    </div>
    
    <div class="about-section">
      <h3>About</h3>
      <p>Passionate UI/UX designer with 5+ years of experience creating digital experiences that are both beautiful and functional. I love working with gradients and modern typography.</p>
    </div>
    
    <div class="action-buttons">
      <button class="btn-primary">Follow</button>
      <button class="btn-secondary">Message</button>
    </div>
  </div>

  <app-bottom-nav></app-bottom-nav>
</div>
